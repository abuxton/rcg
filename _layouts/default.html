<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}">
    <meta name="author" content="{{ site.title }}">

    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

    <link rel="stylesheet" href="{{ '/css/bootstrap.min.css' | relative_url }}" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Merriweather:400,300,300italic,400italic,700,700italic,900,900italic" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="{{ '/font-awesome/css/font-awesome.min.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/css/animate.min.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}" type="text/css">

    <style>
      .page-section {
        padding: 120px 0 80px;
      }

      .subpage-header {
        min-height: 50vh;
      }

      .subpage-header .header-content {
        padding: 140px 15px 80px;
      }

      .subpage-header .header-content-inner {
        max-width: 960px;
        margin: 0 auto;
      }

      .subpage-header h1 {
        margin-bottom: 0.5em;
      }

      .post-card {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 4px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }

      .post-card h3 {
        margin-top: 0;
      }

      .muted-meta {
        color: #777;
        font-size: 0.9em;
      }

      .content-body img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>

  <body id="page-top" class="layout-{{ page.layout | default: 'default' }}">
    <nav id="mainNav" class="navbar navbar-default navbar-fixed-top">
      <div class="container-fluid">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#rcg-navbar">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand page-scroll" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>

        <div class="collapse navbar-collapse" id="rcg-navbar">
          <ul class="nav navbar-nav navbar-right">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/about/' | relative_url }}">About</a></li>
            <li><a href="{{ '/glossary/' | relative_url }}">Glossary</a></li>
            {% if page.url == '/' %}
              <li><a class="page-scroll" href="#posts">Posts</a></li>
              <li><a class="page-scroll" href="#contact">Contact</a></li>
            {% else %}
              <li><a href="{{ '/#posts' | relative_url }}">Posts</a></li>
              <li><a href="{{ '/#contact' | relative_url }}">Contact</a></li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    {{ content }}

    <script src="{{ '/js/jquery.js' | relative_url }}"></script>
    <script src="{{ '/js/bootstrap.min.js' | relative_url }}"></script>
    <script src="{{ '/js/jquery.easing.min.js' | relative_url }}"></script>
    <script src="{{ '/js/jquery.fittext.js' | relative_url }}"></script>
    <script src="{{ '/js/wow.min.js' | relative_url }}"></script>
    <script src="{{ '/js/creative.js' | relative_url }}"></script>
  </body>
</html>
